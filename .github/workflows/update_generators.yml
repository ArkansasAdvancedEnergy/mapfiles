name: Update EIA Generators

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month at 8:00 AM UTC
  workflow_dispatch:        # allows manual trigger from the Actions tab

jobs:
  update-generators:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit and push the GeoJSON

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch EIA data and generate GeoJSON
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python fetch_generators (1).py

      - name: Check if GeoJSON changed
        id: check_changes
        run: |
          git diff --quiet generators.geojson && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated GeoJSON
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generators.geojson
          git commit -m "Update generators.geojson from EIA 860M ($(date +'%Y-%m'))"
          git push

      - name: No changes detected
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "generators.geojson is already up to date — no commit needed."
